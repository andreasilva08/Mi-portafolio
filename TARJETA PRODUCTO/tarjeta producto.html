<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>GAFAS VR - GRANDE</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #080818;
            min-height: 100vh;
            text-align: center;
            padding: 80px 20px;
            font-family: "Trebuchet MS", "Century Gothic", sans-serif;
        }

        .tarjeta {
            width: 380px; 
            background: linear-gradient(160deg, #141432 0%, #2a1050 45%, #141432 100%);
            border-radius: 32px; 
            overflow: hidden;
            margin: 0 auto;
            box-shadow:
                0 40px 80px rgba(0, 0, 0, 0.85),
                0 0 0 1px rgba(255, 255, 255, 0.06),
                inset 0 1px 0 rgba(255, 255, 255, 0.08);
        }

        .imagen {
            padding: 0 0 70px 0;
            background: radial-gradient(ellipse 130% 90% at 55% 65%,
                    rgba(210, 60, 255, 0.28) 0%,
                    rgba(140, 40, 200, 0.12) 45%,
                    transparent 75%);
            overflow: hidden;
        }

        .precio {
            float: right;
            background: linear-gradient(135deg, #d4b9d8, #9333ea);
            color: #fff;
            font-family: "Century Gothic", "Futura", monospace;
            font-weight: 900;
            font-size: 18px; 
            padding: 12px 24px; 
            border-radius: 0 0 0 24px;
            letter-spacing: 1px;
            box-shadow: -4px 4px 20px rgba(180, 60, 255, 0.6);
        }

        .gafas {
            width: 280px; 
            height: 210px; 
            object-fit: cover;
            filter:
                drop-shadow(0 0 18px rgb(69, 42, 73)) 
                drop-shadow(0 0 40px rgba(180, 40, 255, 0.7)) 
                drop-shadow(0 8px 20px rgba(0, 0, 0, 0.6));
            padding-top: 15px;
            text-align: center;
            margin: 0 auto;
        }

        .info {
            padding: 20px 24px 14px; 
            border-top: 1px solid rgba(180, 80, 255, 0.25);
            overflow: hidden;
        }

        .col-izq {
            float: left;
            width: 46%; 
            text-align: left;
        }

        .nombre-pro {
            font-family: "Century Gothic", "Futura", monospace;
            font-size: 18px; 
            font-weight: 900;
            color: #f0eaff;
            text-transform: uppercase;
            line-height: 1.3;
            margin-bottom: 12px;
            letter-spacing: 0.5px;
        }

        .prodct-descrp {
            font-size: 12px; 
            color: rgba(210, 195, 235, 0.65);
            line-height: 1.55;
            margin-bottom: 14px;
        }

        .estrellas {
            font-size: 18px; 
            color: #fbbf24;
            letter-spacing: 2px;
        }

        .col-der {
            float: right;
            width: 50%;
            text-align: left;
        }

        
        .fila-carct {
            padding-bottom: 10px;
            margin-bottom: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.07);
        }

        .ultima-carct {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .titl-carct {
            font-family: "Century Gothic", "Futura", monospace;
            font-size: 11px; 
            font-weight: 700;
            color: #c084fc;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            margin-bottom: 4px;
        }

        .text-carct {
            font-size: 11px; 
            color: rgba(200, 185, 225, 0.6);
            line-height: 1.45;
        }

        
        .btn {
            clear: both;
            padding: 16px 24px 28px;
        }

        .btn-tarjt {
            background: transparent;
            color: #d8b4fe;
            border: 2px solid rgba(168, 85, 247, 0.55); 
            border-radius: 50px;
            padding: 14px 40px; 
            font-family: "Century Gothic", "Futura", monospace;
            font-size: 12px; 
            font-weight: 700;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 0 0 18px rgba(168, 85, 247, 0.25);
            transition: box-shadow 0.3s, border-color 0.3s, color 0.3s;
        }

        .btn-efct:hover {
            border-color: rgba(217, 70, 239, 0.9);
            color: #fff;
            box-shadow: 0 0 30px rgba(200, 60, 255, 0.55);
        }
    </style>
</head>

<body>

    <div class="tarjeta">

        <div class="imagen">
            <span class="precio">$349</span>
            <div class="gafas">
                <img class="gafas" src="img/gafas.png" alt="Gafas VR">
            </div>
        </div>

        <div class="info">

            <div class="col-izq">
                <h2 class="nombre-pro">Nova<br>Vision X</h2>
                <p class="prodct-descrp">Sumérgete en otra realidad con total libertad de movimiento.</p>
                <div class="estrellas">★★★★☆</div>
            </div>

            <div class="col-der">
                <div class="fila-carct">
                    <div class="titl-carct">Resolución</div>
                    <div class="text-carct">2160 x 2160 px por ojo, ultra nítida.</div>
                </div>
                <div class="fila-carct">
                    <div class="titl-carct">Batería</div>
                    <div class="text-carct">Hasta 3 horas de uso continuo.</div>
                </div>
                <div class="fila-carct ultima-carct">
                    <div class="titl-carct">Peso</div>
                    <div class="text-carct">295g, diseño ligero y ergonómico.</div>
                </div>
            </div>

        </div>

        <div class="btn">
            <button class="btn-tarjt btn-efct">Añadir al carrito</button>
        </div>

    </div>

</body>

</html>
